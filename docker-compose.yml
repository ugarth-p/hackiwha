services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: hackiwha-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: hackiwha
      POSTGRES_PASSWORD: hackiwha_dev
      POSTGRES_DB: hackiwha
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hackiwha -d hackiwha"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: hackiwha-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://hackiwha:hackiwha_dev@postgres:5432/hackiwha
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_EMBEDDING_API_KEY: ${GEMINI_EMBEDDING_API_KEY:-${GEMINI_API_KEY}}
      TAVILY_API_KEY: ${TAVILY_API_KEY}
      FRONTEND_URL: http://localhost:5173
      PORT: 3000

  frontend:
    build: ./frontend
    container_name: hackiwha-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
