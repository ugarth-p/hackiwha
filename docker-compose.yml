services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: hackiwha-postgres
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: hackiwha
      POSTGRES_PASSWORD: hackiwha_dev
      POSTGRES_DB: hackiwha
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hackiwha -d hackiwha"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: hackiwha-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://hackiwha:hackiwha_dev@postgres:5432/hackiwha
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_EMBEDDING_API_KEY: ${GEMINI_EMBEDDING_API_KEY:-${GEMINI_API_KEY}}
      TAVILY_API_KEY: ${TAVILY_API_KEY}
      FRONTEND_URL: https://aether.semdev.app
      PORT: 3000
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/', r => { process.exit(r.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build: ./frontend
    container_name: hackiwha-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/nginx.ssl.conf
      - ./frontend/nginx.http.conf:/etc/nginx/nginx.http.conf
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - certbot-www:/var/www/html

  certbot:
    image: certbot/certbot
    container_name: hackiwha-certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - certbot-www:/var/www/html
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  pgdata:
  certbot-etc:
  certbot-var:
  certbot-www:
