services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: hackiwha-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: hackiwha
      POSTGRES_PASSWORD: hackiwha_dev
      POSTGRES_DB: hackiwha
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d

volumes:
  pgdata:
